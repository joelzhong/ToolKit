<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Reader</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      line-height: 1.6;
      color: #333;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      display: flex;
      height: calc(100vh - 60px);
      margin-top: 40px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    /* ===== 左侧面板 ===== */
    .workspace-panel {
      width: 280px;
      background-color: #f5f5f5;
      border-right: 1px solid #e0e0e0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }

    /* ===== 标签页导航 ===== */
    .tab-nav {
      display: flex;
      background-color: #e8e8e8;
      border-bottom: 1px solid #e0e0e0;
      flex-shrink: 0;
    }

    .tab-btn {
      flex: 1;
      padding: 10px 12px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: #666;
      transition: all 0.2s;
      border-bottom: 2px solid transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .tab-btn:hover {
      color: #333;
      background-color: #f0f0f0;
    }

    .tab-btn.active {
      color: #0366d6;
      border-bottom-color: #0366d6;
      background-color: #f5f5f5;
    }

    .tab-btn .tab-icon {
      font-size: 14px;
    }

    /* ===== 标签页内容 ===== */
    .tab-content {
      display: none;
      flex: 1;
      overflow: hidden;
      flex-direction: column;
    }

    .tab-content.active {
      display: flex;
    }

    .tab-header {
      padding: 8px 10px;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #eee;
      flex-shrink: 0;
    }

    .tab-header h3 {
      font-size: 12px;
      font-weight: 600;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #555;
    }

    .tab-actions {
      display: flex;
      gap: 5px;
    }

    .tab-actions button {
      width: 22px;
      height: 22px;
      border: none;
      background-color: transparent;
      cursor: pointer;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .tab-actions button:hover {
      background-color: #d0d0d0;
    }

    .tab-body {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .file-list {
      padding: 4px;
    }

    .file-item {
      padding: 6px 10px;
      cursor: pointer;
      border-radius: 3px;
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-item:hover {
      background-color: #e0e0e0;
    }

    .file-item.active {
      background-color: #0366d6;
      color: white;
    }

    .file-item .file-name {
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .file-actions {
      display: none;
      gap: 4px;
      flex-shrink: 0;
    }

    .file-item:hover .file-actions {
      display: flex;
    }

    .file-actions button {
      width: 18px;
      height: 18px;
      border: none;
      background-color: transparent;
      cursor: pointer;
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
    }

    .file-actions button:hover {
      background-color: rgba(255, 255, 255, 0.2);
    }

    /* ===== 目录树 ===== */
    .toc-tree {
      padding: 6px 0;
      list-style: none;
    }

    .toc-tree ul {
      list-style: none;
      padding-left: 0;
    }

    .toc-item {
      display: flex;
      align-items: center;
      padding: 3px 10px 3px 0;
      cursor: pointer;
      font-size: 12px;
      color: #555;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border-radius: 0;
      transition: background-color 0.15s;
    }

    .toc-item:hover {
      background-color: #e0e0e0;
    }

    .toc-item.active {
      background-color: #dbeafe;
      color: #0366d6;
    }

    .toc-item.level-1 {
      padding-left: 10px;
      font-weight: 600;
      font-size: 13px;
    }

    .toc-item.level-2 {
      padding-left: 22px;
      font-weight: 500;
    }

    .toc-item.level-3 {
      padding-left: 34px;
      font-weight: 400;
      font-size: 11.5px;
    }

    .toc-item .toc-icon {
      margin-right: 4px;
      flex-shrink: 0;
      font-size: 10px;
      opacity: 0.6;
    }

    .toc-empty {
      padding: 20px 10px;
      text-align: center;
      color: #aaa;
      font-size: 12px;
    }

    /* ===== 右侧内容区域 ===== */
    .content-area {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .preview-container {
      flex: 1;
      overflow: auto;
      background-color: white;
    }

    .preview {
      padding: 30px 40px;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
      box-sizing: border-box;
    }

    /* ===== 可编辑区块 ===== */
    .md-block {
      position: relative;
      border-radius: 4px;
      transition: background-color 0.2s, box-shadow 0.2s;
      cursor: text;
      min-height: 1em;
    }

    .md-block:hover {
      background-color: #f8f9ff;
    }

    .md-block.editing {
      background-color: #fff;
      box-shadow: 0 0 0 2px #0366d6;
      outline: none;
    }

    .md-block-editor {
      width: 100%;
      min-height: 60px;
      border: none;
      outline: none;
      resize: vertical;
      font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
      font-size: 13px;
      line-height: 1.6;
      padding: 12px;
      background-color: #fafbfc;
      border-radius: 4px;
      color: #333;
    }

    .md-block-editor:focus {
      background-color: #fff;
    }

    .edit-hint {
      position: absolute;
      top: 4px;
      right: 4px;
      font-size: 10px;
      color: #aaa;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      background-color: rgba(255,255,255,0.85);
      padding: 1px 6px;
      border-radius: 3px;
    }

    .md-block:hover .edit-hint {
      opacity: 1;
    }

    .md-block.editing .edit-hint {
      display: none;
    }

    /* ===== 代码块样式 ===== */
    .code-block {
      position: relative;
      margin: 1em 0;
      border: 1px solid #e1e4e8;
      border-radius: 6px;
      overflow: hidden;
      background-color: #fafbfc;
    }

    .code-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 12px;
      background-color: #f1f3f5;
      border-bottom: 1px solid #e1e4e8;
      font-size: 12px;
      color: #666;
    }

    .code-lang {
      font-weight: 500;
      text-transform: uppercase;
      font-size: 11px;
    }

    .code-edit-btn {
      padding: 2px 8px;
      font-size: 11px;
      border: 1px solid #d0d0d0;
      background-color: #fff;
      border-radius: 3px;
      cursor: pointer;
      color: #666;
    }

    .code-edit-btn:hover {
      background-color: #f0f0f0;
      color: #333;
    }

    .code-content {
      padding: 12px;
      overflow-x: auto;
    }

    .code-content pre {
      margin: 0;
      background: transparent;
      padding: 0;
    }

    .code-content code {
      font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
      font-size: 13px;
      line-height: 1.5;
    }

    .code-editor-wrapper {
      padding: 12px;
    }

    .code-editor-wrapper textarea {
      width: 100%;
      min-height: 100px;
      border: 1px solid #e1e4e8;
      border-radius: 4px;
      padding: 12px;
      font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
      font-size: 13px;
      line-height: 1.5;
      resize: vertical;
      outline: none;
      background-color: #fff;
      color: #333;
    }

    .code-editor-wrapper textarea:focus {
      border-color: #0366d6;
      box-shadow: 0 0 0 2px rgba(3, 102, 214, 0.15);
    }

    .code-apply-btn {
      margin-top: 8px;
      padding: 4px 12px;
      font-size: 12px;
      border: 1px solid #0366d6;
      background-color: #0366d6;
      color: white;
      border-radius: 4px;
      cursor: pointer;
    }

    .code-apply-btn:hover {
      background-color: #025aa5;
    }

    /* ===== Mermaid 代码块切换 ===== */
    .mermaid-block {
      position: relative;
      margin: 1em 0;
      border: 1px solid #e1e4e8;
      border-radius: 6px;
      overflow: hidden;
      background-color: #fafbfc;
    }

    .mermaid-tabs {
      display: flex;
      background-color: #f1f3f5;
      border-bottom: 1px solid #e1e4e8;
    }

    .mermaid-tab {
      padding: 6px 16px;
      font-size: 12px;
      cursor: pointer;
      border: none;
      background: none;
      color: #666;
      font-weight: 500;
      transition: all 0.2s;
      border-bottom: 2px solid transparent;
    }

    .mermaid-tab:hover {
      color: #333;
      background-color: #e9ecef;
    }

    .mermaid-tab.active {
      color: #0366d6;
      border-bottom-color: #0366d6;
      background-color: #fff;
    }

    .mermaid-view {
      display: none;
      padding: 16px;
    }

    .mermaid-view.active {
      display: block;
    }

    .mermaid-graph-view {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100px;
      overflow-x: auto;
    }

    .mermaid-graph-view svg {
      max-width: 100%;
      height: auto;
    }

    .mermaid-code-view textarea {
      width: 100%;
      min-height: 120px;
      border: 1px solid #e1e4e8;
      border-radius: 4px;
      padding: 12px;
      font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
      font-size: 13px;
      line-height: 1.5;
      resize: vertical;
      outline: none;
      background-color: #fff;
      color: #333;
    }

    .mermaid-code-view textarea:focus {
      border-color: #0366d6;
      box-shadow: 0 0 0 2px rgba(3, 102, 214, 0.15);
    }

    .mermaid-apply-btn {
      margin-top: 8px;
      padding: 4px 12px;
      font-size: 12px;
      border: 1px solid #0366d6;
      background-color: #0366d6;
      color: white;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .mermaid-apply-btn:hover {
      background-color: #025aa5;
    }

    /* ===== Markdown 渲染样式 ===== */
    .preview h1 {
      font-size: 2em;
      margin: 1em 0 0.5em;
      padding-bottom: 0.3em;
      border-bottom: 1px solid #eaecef;
    }

    .preview h2 {
      font-size: 1.5em;
      margin: 1em 0 0.5em;
      padding-bottom: 0.3em;
      border-bottom: 1px solid #eaecef;
    }

    .preview h3 {
      font-size: 1.25em;
      margin: 1em 0 0.5em;
    }

    .preview h4 {
      font-size: 1em;
      margin: 1em 0 0.5em;
    }

    .preview h5 {
      font-size: 0.875em;
      margin: 1em 0 0.5em;
    }

    .preview h6 {
      font-size: 0.85em;
      color: #6a737d;
      margin: 1em 0 0.5em;
    }

    .preview p {
      margin: 1em 0;
    }

    .preview blockquote {
      border-left: 4px solid #ddd;
      padding: 0 1em;
      color: #666;
      margin: 1em 0;
    }

    .preview ul,
    .preview ol {
      margin: 1em 0;
      padding-left: 2em;
    }

    .preview li {
      margin: 0.5em 0;
    }

    .preview code {
      background-color: #f6f8fa;
      padding: 0.2em 0.4em;
      border-radius: 3px;
      font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
      font-size: 0.9em;
    }

    .preview pre {
      background-color: #f6f8fa;
      padding: 1em;
      border-radius: 3px;
      overflow-x: auto;
      margin: 1em 0;
    }

    .preview pre code {
      background-color: transparent;
      padding: 0;
    }

    .preview a {
      color: #0366d6;
      text-decoration: none;
    }

    .preview a:hover {
      text-decoration: underline;
    }

    .preview img {
      max-width: 100%;
      margin: 1em 0;
    }

    .preview table {
      border-collapse: collapse;
      width: 100%;
      margin: 1em 0;
    }

    .preview th,
    .preview td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
    }

    .preview th {
      background-color: #f6f8fa;
      font-weight: 600;
    }

    .preview tr:nth-child(even) {
      background-color: #f6f8fa;
    }

    .preview hr {
      border: none;
      border-top: 1px solid #eaecef;
      margin: 2em 0;
    }

    /* ===== 工具栏 ===== */
    .toolbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 40px;
      background-color: #f8f8f8;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      padding: 0 10px;
      z-index: 100;
    }

    .toolbar button {
      margin-right: 8px;
      padding: 5px 12px;
      border: 1px solid #ddd;
      background-color: #fff;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
    }

    .toolbar button:hover {
      background-color: #f0f0f0;
    }

    .toolbar .toolbar-title {
      margin-left: 16px;
      font-size: 14px;
      font-weight: 500;
      color: #333;
    }

    /* ===== 状态栏 ===== */
    .status-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 20px;
      background-color: #f8f8f8;
      border-top: 1px solid #e0e0e0;
      font-size: 12px;
      line-height: 20px;
      padding: 0 10px;
      color: #666;
      display: flex;
      justify-content: space-between;
    }

    /* ===== 模态框 ===== */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0, 0, 0, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background-color: white;
      padding: 20px;
      border-radius: 5px;
      width: 400px;
      max-width: 90%;
    }

    .modal h3 {
      margin-bottom: 15px;
      font-size: 16px;
    }

    .modal input {
      width: 100%;
      padding: 8px;
      margin-bottom: 15px;
      border: 1px solid #ddd;
      border-radius: 3px;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .modal-actions button {
      padding: 5px 15px;
      border: 1px solid #ddd;
      background-color: #fff;
      border-radius: 3px;
      cursor: pointer;
    }

    .modal-actions button:hover {
      background-color: #f0f0f0;
    }

    .modal-actions button.primary {
      background-color: #0366d6;
      color: white;
      border-color: #0366d6;
    }

    .modal-actions button.primary:hover {
      background-color: #025aa5;
    }

    /* ===== 滚动条美化 ===== */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background-color: #c1c1c1;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background-color: #a1a1a1;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button onclick="openFile()">打开</button>
    <button onclick="saveFile()">保存</button>
    <button onclick="exportHTML()">导出HTML</button>
    <span class="toolbar-title">Markdown Reader</span>
  </div>

  <div class="container">
    <!-- 左侧面板 -->
    <div class="workspace-panel">
      <!-- 标签页导航 -->
      <div class="tab-nav">
        <button class="tab-btn active" data-tab="workspace" onclick="switchTab('workspace')">
          工作空间
        </button>
        <button class="tab-btn" data-tab="toc" onclick="switchTab('toc')">
          目录
        </button>
      </div>

      <!-- 工作空间标签页 -->
      <div class="tab-content active" id="workspaceTab">
        <div class="tab-header">
          <h3>文件列表</h3>
          <div class="tab-actions">
            <button onclick="createNewFile()" title="新建文件">+</button>
            <button onclick="refreshFiles()" title="刷新">↻</button>
          </div>
        </div>
        <div class="tab-body">
          <div class="file-list" id="fileList"></div>
        </div>
      </div>

      <!-- 目录标签页 -->
      <div class="tab-content" id="tocTab">
        <div class="tab-header">
          <h3>文档目录</h3>
        </div>
        <div class="tab-body">
          <div id="tocTree">
            <div class="toc-empty">暂无目录</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 右侧内容区域 -->
    <div class="content-area">
      <div class="preview-container" id="previewContainer">
        <div class="preview" id="preview"></div>
      </div>
    </div>
  </div>

  <div class="status-bar">
    <div class="file-info" id="fileInfo">未命名.md</div>
    <div>点击区块可编辑 | Ctrl+S 保存 | Ctrl+O 打开 | 支持HTML拖入转换</div>
  </div>

  <input type="file" id="fileInput" style="display: none;" accept=".md,.markdown,.txt,.html,.htm">
  <a id="downloadLink" style="display: none;"></a>

  <!-- 新建文件模态框 -->
  <div class="modal" id="newFileModal">
    <div class="modal-content">
      <h3>新建文件</h3>
      <input type="text" id="newFileName" placeholder="请输入文件名（包含.md扩展名）" value="untitled.md">
      <div class="modal-actions">
        <button onclick="closeNewFileModal()">取消</button>
        <button class="primary" onclick="confirmNewFile()">创建</button>
      </div>
    </div>
  </div>

  <!-- 删除确认模态框 -->
  <div class="modal" id="deleteModal">
    <div class="modal-content">
      <h3>确认删除</h3>
      <p style="margin-bottom:15px;color:#666;">确定要删除此文件吗？此操作不可撤销。</p>
      <div class="modal-actions">
        <button onclick="closeDeleteModal()">取消</button>
        <button class="primary" style="background-color:#dc3545;border-color:#dc3545;" onclick="confirmDelete()">删除</button>
      </div>
    </div>
  </div>

  <!-- 本地依赖，支持离线使用 -->
  <link rel="stylesheet" href="css/github.min.css">
  <script src="js/marked.min.js"></script>
  <script src="js/highlight.core.min.js"></script>
  <script src="js/highlight.javascript.min.js"></script>
  <script src="js/highlight.python.min.js"></script>
  <script src="js/highlight.java.min.js"></script>
  <script src="js/highlight.cpp.min.js"></script>
  <script src="js/highlight.sql.min.js"></script>
  <script src="js/highlight.json.min.js"></script>
  <script src="js/mermaid.min.js"></script>
  <script src="js/turndown.min.js"></script>

  <script>
    // ===== 初始化 Mermaid =====
    mermaid.initialize({
      startOnLoad: false,
      theme: 'default',
      securityLevel: 'loose',
      suppressErrors: true
    });

    // ===== 初始化 TurndownService (HTML转Markdown) =====
    let turndownService = null;
    function initTurndown() {
      if (typeof TurndownService !== 'undefined') {
        turndownService = new TurndownService({
          headingStyle: 'atx',
          codeBlockStyle: 'fenced',
          bulletListMarker: '-'
        });
        // 添加自定义规则
        turndownService.addRule('strikethrough', {
          filter: ['del', 's'],
          replacement: function(content) {
            return '~~' + content + '~~';
          }
        });
      }
    }

    // ===== 全局状态 =====
    let currentFile = null;
    let files = [];
    let markdownSource = '';
    let blockMap = [];
    let mermaidCounter = 0;
    let codeBlockCounter = 0;
    let isEditing = false;
    let tocClickScrolling = false;

    // ===== DOM 引用 =====
    const preview = document.getElementById('preview');
    const previewContainer = document.getElementById('previewContainer');
    const fileInfo = document.getElementById('fileInfo');
    const fileInput = document.getElementById('fileInput');
    const downloadLink = document.getElementById('downloadLink');
    const fileList = document.getElementById('fileList');
    const newFileModal = document.getElementById('newFileModal');
    const newFileName = document.getElementById('newFileName');
    const deleteModal = document.getElementById('deleteModal');
    const tocTree = document.getElementById('tocTree');
    let pendingDeleteFileId = null;  // 待删除的文件ID

    // ===== 检查Electron环境 =====
    // 检测 Electron 环境
    const isElectron = typeof window.electronAPI !== 'undefined';

    // Electron 环境下的文件操作
    if (isElectron) {
      // 监听文件夹打开事件（保留旧接口兼容）
      if (window.electron && window.electron.ipcRenderer) {
        window.electron.ipcRenderer.on('folder-opened', (event, data) => {
          files = [];
          data.files.forEach(file => {
            files.push({
              id: generateId(),
              name: file.name,
              content: file.content,
              path: file.path
            });
          });
          saveFiles();
          renderFileList();
          if (files.length > 0) {
            openFileFromList(files[0].id);
          }
        });
      }
    }

    // ===== 标签页切换 =====
    function switchTab(tabName) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

      document.querySelector(`.tab-btn[data-tab="${tabName}"]`).classList.add('active');
      document.getElementById(tabName + 'Tab').classList.add('active');
    }

    // ===== Markdown 解析与区块分割 =====

    function parseBlocks(source) {
      const lines = source.split('\n');
      const blocks = [];
      let i = 0;

      while (i < lines.length) {
        const line = lines[i];

        if (line.trim() === '') {
          i++;
          continue;
        }

        const headingMatch = line.match(/^(#{1,6})\s+(.+)/);
        if (headingMatch) {
          blocks.push({ type: 'heading', raw: line });
          i++;
          continue;
        }

        if (/^(-{3,}|\*{3,}|_{3,})\s*$/.test(line.trim())) {
          blocks.push({ type: 'hr', raw: line });
          i++;
          continue;
        }

        if (line.trim().startsWith('```')) {
          const lang = line.trim().slice(3).trim();
          const codeLines = [];
          i++;
          while (i < lines.length && !lines[i].trim().startsWith('```')) {
            codeLines.push(lines[i]);
            i++;
          }
          if (i < lines.length) i++;
          const codeContent = codeLines.join('\n');
          if (lang === 'mermaid') {
            blocks.push({ type: 'mermaid', raw: '```mermaid\n' + codeContent + '\n```', code: codeContent });
          } else {
            blocks.push({ type: 'code', raw: '```' + (lang ? lang : '') + '\n' + codeContent + '\n```', code: codeContent, lang: lang || 'text' });
          }
          continue;
        }

        if (line.includes('|') && i + 1 < lines.length && /^\|?\s*[-:]+[-|:\s]+/.test(lines[i + 1])) {
          const tableLines = [line];
          i++;
          while (i < lines.length && lines[i].includes('|') && lines[i].trim() !== '') {
            tableLines.push(lines[i]);
            i++;
          }
          blocks.push({ type: 'table', raw: tableLines.join('\n') });
          continue;
        }

        if (line.trim().startsWith('>')) {
          const quoteLines = [];
          while (i < lines.length && (lines[i].trim().startsWith('>') || (lines[i].trim() !== '' && quoteLines.length > 0 && !lines[i].trim().startsWith('#')))) {
            quoteLines.push(lines[i]);
            i++;
            if (lines[i] && lines[i].trim() === '') break;
          }
          blocks.push({ type: 'blockquote', raw: quoteLines.join('\n') });
          continue;
        }

        if (/^\s*[-*+]\s/.test(line) || /^\s*\d+\.\s/.test(line)) {
          const listLines = [];
          while (i < lines.length && (/^\s*[-*+]\s/.test(lines[i]) || /^\s*\d+\.\s/.test(lines[i]) || (lines[i].trim() !== '' && /^\s{2,}/.test(lines[i])))) {
            listLines.push(lines[i]);
            i++;
          }
          blocks.push({ type: 'list', raw: listLines.join('\n') });
          continue;
        }

        const paraLines = [];
        while (i < lines.length && lines[i].trim() !== '' && !lines[i].trim().startsWith('#') && !lines[i].trim().startsWith('```') && !lines[i].trim().startsWith('>') && !/^\s*[-*+]\s/.test(lines[i]) && !/^\s*\d+\.\s/.test(lines[i]) && !/^(-{3,}|\*{3,}|_{3,})\s*$/.test(lines[i].trim())) {
          paraLines.push(lines[i]);
          i++;
        }
        if (paraLines.length > 0) {
          blocks.push({ type: 'paragraph', raw: paraLines.join('\n') });
        }
      }

      return blocks;
    }

    function rebuildSource(blocks) {
      return blocks.map(b => b.raw).join('\n\n') + '\n';
    }

    function renderPreview() {
      blockMap = [];
      mermaidCounter = 0;
      codeBlockCounter = 0;
      preview.innerHTML = '';

      const blocks = parseBlocks(markdownSource);

      blocks.forEach((block, index) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'md-block';
        wrapper.dataset.blockIndex = index;

        if (block.type === 'mermaid') {
          renderMermaidBlock(wrapper, block, index);
        } else if (block.type === 'code') {
          renderCodeBlock(wrapper, block, index);
        } else {
          const htmlContent = marked.parse(block.raw);
          wrapper.innerHTML = htmlContent + '<span class="edit-hint">点击编辑</span>';
        }

        wrapper.addEventListener('mousedown', (e) => {
          if (isEditing) return;
          if (tocClickScrolling) return;
          if (e.target.tagName === 'A') return;
          if (e.target.closest('.mermaid-block')) return;
          if (e.target.closest('.code-block')) return;
          wrapper._editClick = true;
        });

        wrapper.addEventListener('click', (e) => {
          if (isEditing) return;
          if (tocClickScrolling) return;
          if (e.target.tagName === 'A') return;
          if (e.target.closest('.mermaid-block')) return;
          if (e.target.closest('.code-block')) return;
          if (wrapper._editClick) {
            wrapper._editClick = false;
            startEditing(wrapper, index);
          }
        });

        preview.appendChild(wrapper);
        blockMap.push({ index, type: block.type, raw: block.raw, element: wrapper });
      });

      renderMermaidDiagrams();
      highlightCodeBlocks();
      updateTOC(blocks);
    }

    // ===== 普通代码块渲染 =====
    function renderCodeBlock(wrapper, block, index) {
      const blockId = 'code-block-' + codeBlockCounter++;
      const lang = block.lang || 'text';
      wrapper.style.cursor = 'default';

      let highlightedCode = escapeHtml(block.code);
      try {
        if (hljs.getLanguage(lang)) {
          highlightedCode = hljs.highlight(block.code, { language: lang }).value;
        } else {
          highlightedCode = hljs.highlightAuto(block.code).value;
        }
      } catch (e) {
        highlightedCode = escapeHtml(block.code);
      }

      wrapper.innerHTML = `
        <div class="code-block" id="${blockId}">
          <div class="code-header">
            <span class="code-lang">${lang}</span>
            <button class="code-edit-btn" onclick="toggleCodeEdit('${blockId}', ${index})">编辑</button>
          </div>
          <div class="code-content code-display" data-view="display">
            <pre><code class="hljs language-${lang}">${highlightedCode}</code></pre>
          </div>
          <div class="code-editor-wrapper" data-view="editor" style="display:none;">
            <textarea class="code-editor" spellcheck="false">${escapeHtml(block.code)}</textarea>
            <button class="code-apply-btn" onclick="applyCodeEdit('${blockId}', ${index})">应用更改</button>
          </div>
        </div>
      `;
    }

    function toggleCodeEdit(blockId, blockIndex) {
      const block = document.getElementById(blockId);
      const display = block.querySelector('.code-display');
      const editor = block.querySelector('.code-editor-wrapper');
      const btn = block.querySelector('.code-edit-btn');

      if (editor.style.display === 'none') {
        display.style.display = 'none';
        editor.style.display = 'block';
        btn.textContent = '取消';
        block.querySelector('.code-editor').focus();
      } else {
        display.style.display = 'block';
        editor.style.display = 'none';
        btn.textContent = '编辑';
      }
    }

    function applyCodeEdit(blockId, blockIndex) {
      const block = document.getElementById(blockId);
      const textarea = block.querySelector('.code-editor');
      const newCode = textarea.value;
      const lang = blockMap[blockIndex].lang || 'text';

      blockMap[blockIndex].raw = '```' + lang + '\n' + newCode + '\n```';
      blockMap[blockIndex].code = newCode;

      markdownSource = rebuildSource(blockMap.map(b => ({ type: b.type, raw: b.raw, lang: b.lang, code: b.code })));

      if (currentFile) {
        currentFile.content = markdownSource;
        saveFiles();
      }

      // 更新显示
      let highlightedCode = escapeHtml(newCode);
      try {
        if (hljs.getLanguage(lang)) {
          highlightedCode = hljs.highlight(newCode, { language: lang }).value;
        }
      } catch (e) {}

      block.querySelector('.code-display pre code').innerHTML = highlightedCode;
      toggleCodeEdit(blockId, blockIndex);

      const blocks = parseBlocks(markdownSource);
      updateTOC(blocks);
    }

    function highlightCodeBlocks() {
      document.querySelectorAll('.code-content pre code:not(.hljs)').forEach(block => {
        hljs.highlightElement(block);
      });
    }

    // ===== Mermaid 代码块渲染 =====
    function renderMermaidBlock(wrapper, block, index) {
      const blockId = 'mermaid-block-' + mermaidCounter++;
      wrapper.style.cursor = 'default';

      wrapper.innerHTML = `
        <div class="code-block" id="${blockId}">
          <div class="code-header">
            <span class="code-lang">mermaid</span>
            <button class="code-edit-btn" onclick="toggleMermaidEdit('${blockId}', ${index})">编辑</button>
          </div>
          <div class="code-content code-display" data-view="display">
            <div class="mermaid-graph" data-mermaid-code="${encodeURIComponent(block.code)}">加载中...</div>
          </div>
          <div class="code-editor-wrapper" data-view="editor" style="display:none;">
            <textarea class="code-editor" spellcheck="false">${escapeHtml(block.code)}</textarea>
            <button class="code-apply-btn" onclick="applyMermaidCode('${blockId}', ${index})">应用更改</button>
          </div>
        </div>
      `;
    }

    function toggleMermaidEdit(blockId, blockIndex) {
      const block = document.getElementById(blockId);
      const display = block.querySelector('.code-display');
      const editor = block.querySelector('.code-editor-wrapper');
      const btn = block.querySelector('.code-edit-btn');

      if (editor.style.display === 'none') {
        display.style.display = 'none';
        editor.style.display = 'block';
        btn.textContent = '取消';
        block.querySelector('.code-editor').focus();
      } else {
        display.style.display = 'block';
        editor.style.display = 'none';
        btn.textContent = '编辑';
      }
    }

    function applyMermaidCode(blockId, blockIndex) {
      const block = document.getElementById(blockId);
      const textarea = block.querySelector('.code-editor');
      const newCode = textarea.value;

      blockMap[blockIndex].raw = '```mermaid\n' + newCode + '\n```';
      blockMap[blockIndex].code = newCode;
      markdownSource = rebuildSource(blockMap.map(b => ({ type: b.type, raw: b.raw, code: b.type === 'mermaid' ? newCode : undefined })));

      const graphDiv = block.querySelector('.mermaid-graph');
      graphDiv.dataset.mermaidCode = encodeURIComponent(newCode);
      graphDiv.innerHTML = '加载中...';

      mermaid.render(blockId + '-graph-' + Date.now(), newCode).then(({ svg }) => {
        graphDiv.innerHTML = svg;
      }).catch(e => {
        console.error('Mermaid render error:', e);
        graphDiv.innerHTML = '<pre style="color:red;">渲染失败: ' + escapeHtml(e.message || String(e)) + '</pre>';
      });

      toggleMermaidEdit(blockId, blockIndex);

      if (currentFile) {
        currentFile.content = markdownSource;
        saveFiles();
      }

      const blocks = parseBlocks(markdownSource);
      updateTOC(blocks);
    }

    async function renderMermaidDiagrams() {
      const mermaidElements = document.querySelectorAll('.mermaid-graph[data-mermaid-code]');
      for (const element of mermaidElements) {
        try {
          const code = decodeURIComponent(element.dataset.mermaidCode);
          const id = 'mermaid-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
          const { svg } = await mermaid.render(id, code);
          element.innerHTML = svg;
        } catch (e) {
          console.error('Mermaid render error:', e);
          element.innerHTML = '<pre style="color:red;">渲染失败</pre>';
        }
      }
    }

    function startEditing(wrapper, blockIndex) {
      isEditing = true;
      wrapper.classList.add('editing');
      const block = blockMap[blockIndex];

      const editor = document.createElement('textarea');
      editor.className = 'md-block-editor';
      editor.value = block.raw;
      editor.spellcheck = false;

      wrapper.innerHTML = '';
      wrapper.appendChild(editor);
      editor.focus();

      function autoResize() {
        editor.style.height = 'auto';
        editor.style.height = Math.max(60, editor.scrollHeight) + 'px';
      }
      autoResize();
      editor.addEventListener('input', autoResize);

      function saveEdit() {
        const newRaw = editor.value;
        blockMap[blockIndex].raw = newRaw;

        if (block.type === 'mermaid') {
          const codeMatch = newRaw.match(/```mermaid\n([\s\S]*?)\n```/);
          if (codeMatch) {
            block.code = codeMatch[1];
          }
        }

        markdownSource = rebuildSource(blockMap.map(b => {
          const item = { type: b.type, raw: b.raw };
          if (b.type === 'mermaid') {
            const codeMatch = b.raw.match(/```mermaid\n([\s\S]*?)\n```/);
            item.code = codeMatch ? codeMatch[1] : '';
          }
          return item;
        }));

        if (currentFile) {
          currentFile.content = markdownSource;
          saveFiles();
        }

        isEditing = false;
        renderPreview();
      }

      editor.addEventListener('blur', () => {
        setTimeout(() => {
          if (isEditing) saveEdit();
        }, 100);
      });

      editor.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 'Enter') {
          e.preventDefault();
          e.stopPropagation();
          saveEdit();
        }
        if (e.key === 'Escape') {
          e.preventDefault();
          e.stopPropagation();
          isEditing = false;
          renderPreview();
        }
      });
    }

    // ===== 目录树 =====

    function updateTOC(blocks) {
      const headings = [];
      blocks.forEach((block, index) => {
        if (block.type === 'heading') {
          const match = block.raw.match(/^(#{1,3})\s+(.+)/);
          if (match) {
            const level = match[1].length;
            const text = match[2].replace(/[*_`~]/g, '').trim();
            headings.push({ level, text, blockIndex: index });
          }
        }
      });

      if (headings.length === 0) {
        tocTree.innerHTML = '<div class="toc-empty">暂无目录</div>';
        return;
      }

      const ul = document.createElement('ul');
      ul.className = 'toc-tree';

      headings.forEach(h => {
        const li = document.createElement('div');
        li.className = `toc-item level-${h.level}`;
        li.dataset.blockIndex = h.blockIndex;

        const icons = { 1: '■', 2: '▪', 3: '·' };
        li.innerHTML = `<span class="toc-icon">${icons[h.level] || '·'}</span><span>${escapeHtml(h.text)}</span>`;

        li.addEventListener('click', (e) => {
          e.stopPropagation();
          e.preventDefault();

          tocTree.querySelectorAll('.toc-item').forEach(item => item.classList.remove('active'));
          li.classList.add('active');

          const blockEl = preview.querySelector(`[data-block-index="${h.blockIndex}"]`);
          if (blockEl) {
            tocClickScrolling = true;
            const container = previewContainer;
            const targetTop = blockEl.offsetTop - preview.offsetTop - 20;
            container.scrollTo({ top: targetTop, behavior: 'smooth' });
            setTimeout(() => {
              tocClickScrolling = false;
            }, 800);
          }
        });

        ul.appendChild(li);
      });

      tocTree.innerHTML = '';
      tocTree.appendChild(ul);
    }

    // ===== 文件管理 =====

    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).substr(2);
    }

    function loadFiles() {
      // 检查版本，清除旧数据
      const version = '2.0';
      const savedVersion = localStorage.getItem('markdown-files-version');
      if (savedVersion !== version) {
        localStorage.removeItem('markdown-files');
        localStorage.setItem('markdown-files-version', version);
      }

      const savedFiles = localStorage.getItem('markdown-files');
      if (savedFiles) {
        files = JSON.parse(savedFiles);
      } else {
        files = [];
      }
      renderFileList();
    }

    function saveFiles() {
      localStorage.setItem('markdown-files', JSON.stringify(files));
    }

    function renderFileList() {
      fileList.innerHTML = '';
      files.forEach(file => {
        const fileItem = document.createElement('div');
        fileItem.className = 'file-item' + (currentFile && currentFile.id === file.id ? ' active' : '');
        fileItem.innerHTML = `
          <span class="file-name">${escapeHtml(file.name)}</span>
          <div class="file-actions">
            <button onclick="event.stopPropagation();deleteFile('${file.id}')" title="删除">✕</button>
          </div>
        `;
        fileItem.onclick = () => openFileFromList(file.id);
        fileList.appendChild(fileItem);
      });
    }

    function openFileFromList(fileId) {
      if (isEditing) return;
      const file = files.find(f => f.id === fileId);
      if (file) {
        currentFile = file;
        markdownSource = file.content;
        fileInfo.textContent = file.name;
        renderPreview();
        renderFileList();
      }
    }

    function createNewFile() {
      newFileModal.classList.add('active');
      newFileName.value = 'untitled.md';
      newFileName.focus();
    }

    function closeNewFileModal() {
      newFileModal.classList.remove('active');
    }

    function confirmNewFile() {
      const fileName = newFileName.value.trim();
      if (fileName) {
        const newFile = {
          id: generateId(),
          name: fileName,
          content: '# ' + fileName.replace(/\.(md|markdown|txt)$/, '') + '\n\n'
        };
        files.push(newFile);
        saveFiles();
        renderFileList();
        openFileFromList(newFile.id);
        closeNewFileModal();
      }
    }

    function deleteFile(fileId) {
      pendingDeleteFileId = fileId;
      deleteModal.classList.add('active');
    }

    function closeDeleteModal() {
      deleteModal.classList.remove('active');
      pendingDeleteFileId = null;
    }

    function confirmDelete() {
      if (!pendingDeleteFileId) return;

      const fileId = pendingDeleteFileId;
      files = files.filter(f => f.id !== fileId);
      if (currentFile && currentFile.id === fileId) {
        currentFile = files.length > 0 ? files[0] : null;
        if (currentFile) {
          markdownSource = currentFile.content;
          fileInfo.textContent = currentFile.name;
          renderPreview();
        } else {
          markdownSource = '';
          fileInfo.textContent = '未命名.md';
          preview.innerHTML = '<div class="toc-empty" style="padding:40px;">请打开或创建一个文件</div>';
          tocTree.innerHTML = '<div class="toc-empty">暂无目录</div>';
        }
      }
      saveFiles();
      renderFileList();
      closeDeleteModal();
    }

    function refreshFiles() {
      loadFiles();
    }

    // ===== 打开/保存文件 =====

    async function openFile() {
      if (isElectron && window.electronAPI) {
        // Electron 环境：使用原生文件对话框
        const result = await window.electronAPI.openFile();
        if (result && result.length > 0) {
          for (const file of result) {
            processFileContent(file.name, file.content);
          }
        }
      } else {
        // 浏览器环境：使用隐藏的 file input
        fileInput.click();
      }
    }

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        processFile(file);
      }
      fileInput.value = '';
    });

    // 处理文件（支持HTML转Markdown）
    function processFile(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        let content = e.target.result;
        let fileName = file.name;

        // 检查是否是HTML文件
        if (file.name.endsWith('.html') || file.name.endsWith('.htm')) {
          if (turndownService) {
            try {
              content = turndownService.turndown(content);
              fileName = file.name.replace(/\.(html|htm)$/, '.md');
              console.log('HTML converted to Markdown successfully');
            } catch (err) {
              console.error('HTML conversion error:', err);
              alert('HTML转换失败，将保留原始内容');
            }
          } else {
            alert('HTML转换服务未加载，请检查网络连接');
          }
        }

        const newFile = {
          id: generateId(),
          name: fileName,
          content: content
        };
        files.push(newFile);
        saveFiles();
        renderFileList();
        openFileFromList(newFile.id);
      };
      reader.readAsText(file);
    }

    // 处理文件内容（Electron 环境调用）
    function processFileContent(fileName, content) {
      // 检查是否是HTML文件
      if (fileName.endsWith('.html') || fileName.endsWith('.htm')) {
        if (turndownService) {
          try {
            content = turndownService.turndown(content);
            fileName = fileName.replace(/\.(html|htm)$/, '.md');
            console.log('HTML converted to Markdown successfully');
          } catch (err) {
            console.error('HTML conversion error:', err);
          }
        }
      }

      const newFile = {
        id: generateId(),
        name: fileName,
        content: content
      };
      files.push(newFile);
      saveFiles();
      renderFileList();
      openFileFromList(newFile.id);
    }

    async function saveFile() {
      if (currentFile) {
        if (isElectron && window.electronAPI) {
          // Electron 环境：使用原生保存对话框
          const result = await window.electronAPI.saveAs(markdownSource, currentFile.name);
          if (result && result.success) {
            console.log('File saved to:', result.filePath);
          }
        } else {
          // 浏览器环境：使用下载链接
          const blob = new Blob([markdownSource], { type: 'text/markdown' });
          const url = URL.createObjectURL(blob);
          downloadLink.href = url;
          downloadLink.download = currentFile.name;
          downloadLink.click();
          URL.revokeObjectURL(url);
        }
      } else {
        createNewFile();
      }
    }

    // ===== 导出 HTML =====
    async function exportHTML() {
      const htmlContent = generateHTML();
      const fileName = currentFile ? currentFile.name.replace(/\.md$/, '.html') : 'export.html';

      if (isElectron && window.electronAPI) {
        // Electron 环境下使用原生对话框
        const result = await window.electronAPI.exportHTML(htmlContent, fileName);
        if (result && result.success) {
          console.log('HTML exported to:', result.filePath);
        }
      } else {
        // 浏览器环境下使用下载链接
        const blob = new Blob([htmlContent], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        downloadLink.href = url;
        downloadLink.download = fileName;
        downloadLink.click();
        URL.revokeObjectURL(url);
      }
    }

    function generateHTML() {
      // 获取当前预览的 HTML 内容
      const previewContent = preview.innerHTML;

      // 构建完整的 HTML 文档
      return `<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>${currentFile ? escapeHtml(currentFile.name) : 'Exported Document'}</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      line-height: 1.6;
      color: #333;
      background-color: #fff;
      padding: 40px;
    }

    // ===== 滚动监听：高亮当前目录项 =====
    previewContainer.addEventListener('scroll', () => {
      if (tocClickScrolling) return;
      const blockElements = preview.querySelectorAll('.md-block');
      const containerRect = previewContainer.getBoundingClientRect();
      let activeIndex = -1;

      blockElements.forEach(el => {
        const rect = el.getBoundingClientRect();
        if (rect.top <= containerRect.top + 100) {
          activeIndex = parseInt(el.dataset.blockIndex);
        }
      });

      if (activeIndex >= 0) {
        const tocItems = tocTree.querySelectorAll('.toc-item');
        tocItems.forEach(item => {
          const itemIndex = parseInt(item.dataset.blockIndex);
          if (itemIndex === activeIndex) {
            item.classList.add('active');
            item.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
          } else {
            item.classList.remove('active');
          }
        });
      }
    });

    // ===== 快捷键 =====
    document.addEventListener('keydown', (e) => {
      if (isEditing) return;
      if (e.ctrlKey) {
        switch (e.key) {
          case 'o':
            e.preventDefault();
            openFile();
            break;
          case 's':
            e.preventDefault();
            saveFile();
            break;
          case 'n':
            e.preventDefault();
            createNewFile();
            break;
        }
      }
    });

    // ===== 模态框关闭 =====
    newFileModal.addEventListener('click', (e) => {
      if (e.target === newFileModal) {
        closeNewFileModal();
      }
    });

    deleteModal.addEventListener('click', (e) => {
      if (e.target === deleteModal) {
        closeDeleteModal();
      }
    });

    // ===== 文件拖放 =====
    function initFileDrop() {
      const workspacePanel = document.querySelector('.workspace-panel');

      workspacePanel.addEventListener('dragover', (e) => {
        e.preventDefault();
        workspacePanel.style.backgroundColor = '#e0e0e0';
      });

      workspacePanel.addEventListener('dragleave', (e) => {
        e.preventDefault();
        workspacePanel.style.backgroundColor = '#f5f5f5';
      });

      workspacePanel.addEventListener('drop', async (e) => {
        e.preventDefault();
        workspacePanel.style.backgroundColor = '#f5f5f5';

        const droppedFiles = e.dataTransfer.files;

        if (isElectron && window.electronAPI) {
          // Electron 环境：通过 IPC 处理文件
          const fileList = [];
          for (let i = 0; i < droppedFiles.length; i++) {
            const file = droppedFiles[i];
            if (file.name.endsWith('.md') || file.name.endsWith('.markdown') ||
                file.name.endsWith('.html') || file.name.endsWith('.htm') ||
                file.name.endsWith('.txt')) {
              fileList.push({
                name: file.name,
                path: file.path  // Electron 提供的文件路径
              });
            }
          }
          if (fileList.length > 0) {
            const result = await window.electronAPI.handleDropFiles(fileList);
            if (result && result.length > 0) {
              for (const file of result) {
                processFileContent(file.name, file.content);
              }
            }
          }
        } else {
          // 浏览器环境：使用 FileReader
          for (let i = 0; i < droppedFiles.length; i++) {
            const file = droppedFiles[i];
            if (file.type === 'text/markdown' ||
                file.name.endsWith('.md') ||
                file.name.endsWith('.markdown') ||
                file.name.endsWith('.html') ||
                file.name.endsWith('.htm')) {
              processFile(file);
            }
          }
        }
      });
    }

    // ===== 工具函数 =====
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ===== 初始化 =====
    initTurndown();
    loadFiles();
    initFileDrop();
    if (files.length > 0) {
      openFileFromList(files[0].id);
    } else {
      preview.innerHTML = '<div class="toc-empty" style="padding:40px;">请打开或创建一个文件</div>';
    }
  </script>
